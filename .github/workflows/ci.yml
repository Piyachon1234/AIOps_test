name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Justification: Running standard linters and fast unit tests first ensures 
      # we fail fast on broken code before triggering resource-intensive evaluation jobs.
      - name: Run Linters and Tests
        run: |
          echo "Running standard tests (e.g., Python pytest or Go tests)..."
          # Exit code > 0 here will fail the PR check and prevent merging

  quality-gate:
    name: Eval Runner Quality Gate
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Justification: The eval-runner is placed in a dedicated job that depends on 
      # build-and-test. This enforces a strict quality gate that must pass before 
      # any deployment can occur, fulfilling the requirement for deployment gating.
      - name: Execute Eval-Runner Service
        run: |
          echo "Triggering eval-runner service for advanced evaluation..."
          # Placeholder for the actual eval-runner invocation, e.g.:
          # ./scripts/run-eval.sh --commit ${{ github.sha }}
          # If the evaluation metrics do not meet the threshold, this step exits with 1.

  deploy:
    name: Deploy to Production
    needs: quality-gate
    # Justification: We only want to deploy to production when code is merged 
    # to the main branch. PRs should run tests and evals, but NOT deploy.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Justification: Using github.sha ensures strict traceability. By injecting the 
      # commit SHA into the deployment manifest, anyone can verify exactly which 
      # commit is currently running in the production environment.
